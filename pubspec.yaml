name: visionaid_app
description: A vision aid mobile application built with Flutter
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  provider: ^6.0.5
  shared_preferences: ^2.2.0
  go_router: ^12.1.3
  camera: ^0.10.5+5
  path_provider: ^2.1.1
  path: ^1.8.3
  flutter_svg: ^2.0.9
  flutter_animate: ^4.2.0+1
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  lottie: ^3.0.0
  shimmer: ^3.0.0
  url_launcher: ^6.2.2
  geolocator: ^10.1.0
  permission_handler: ^11.0.1
  http: ^1.1.0
  flutter_tts: ^3.8.5
  google_mlkit_text_recognition: ^0.14.0
  image_picker: ^1.0.4
  sqflite: ^2.3.0
  connectivity_plus: ^5.0.2
  
  # YOLOv8 Object Detection
  ultralytics_yolo: ^0.1.42
  
  # Firebase packages
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.3
  google_sign_in: ^6.2.1
  google_mlkit_object_detection: ^0.14.0
  tflite_flutter: ^0.12.1
  google_generative_ai: ^0.4.6
  google_mlkit_image_labeling: ^0.13.0
  image: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/models/